<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="pi-postman logo">
  <title>pi-postman</title>
  <desc>An open envelope with a paper sticking out bearing the Greek letter pi.</desc>

  <!-- soft cream background, rounded card -->
  <rect width="256" height="256" rx="28" fill="#FAF7F0"/>

  <!-- envelope back wall (kraft amber) -->
  <rect x="40" y="92" width="176" height="128" rx="4"
        fill="#F5C97B" stroke="#1F1A14" stroke-width="6" stroke-linejoin="round"/>

  <!-- the paper sticking up out of the envelope -->
  <g>
    <rect x="74" y="40" width="108" height="104" rx="2"
          fill="#FFFDF6" stroke="#1F1A14" stroke-width="5"/>
    <!-- a couple of faint rule lines for texture -->
    <line x1="86" y1="62" x2="170" y2="62" stroke="#C9B98F" stroke-width="2" stroke-linecap="round"/>
    <line x1="86" y1="74" x2="158" y2="74" stroke="#C9B98F" stroke-width="2" stroke-linecap="round"/>
    <!-- π mark, the actual content -->
    <text x="128" y="124" text-anchor="middle"
          font-family="'Iowan Old Style','Georgia',serif"
          font-size="56" font-weight="700"
          fill="#1F1A14">π</text>
  </g>

  <!-- envelope front pocket (V-cut pentagon) covers the bottom of the paper -->
  <path d="M 40 92
           L 128 158
           L 216 92
           L 216 220
           L 40 220 Z"
        fill="#E8A93A" stroke="#1F1A14" stroke-width="6" stroke-linejoin="round"/>

  <!-- subtle stamp in the top-right corner of the envelope back, peeking above the front -->
  <g>
    <rect x="178" y="100" width="28" height="32" rx="2"
          fill="#C2410C" stroke="#1F1A14" stroke-width="3"/>
    <circle cx="192" cy="116" r="7" fill="#FAF7F0" stroke="#1F1A14" stroke-width="2"/>
  </g>
</svg>
